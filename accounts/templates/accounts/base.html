<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Contacta{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f1b13;
            --muted: #50635a;
            --accent: #1f8a50;
            --accent-2: #7bc96f;
            --surface: #ffffff;
            --surface-2: #f2f7f3;
            --border: #d7e6dd;
            --danger: #c7372a;
            --shadow: 0 24px 60px rgba(10, 25, 16, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 12% 10%, #e8f7ee, transparent 45%),
                        radial-gradient(circle at 88% 12%, #dff3e6, transparent 38%),
                        linear-gradient(180deg, #f6fbf7 0%, #edf6f1 100%);
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: "Fraunces", "Times New Roman", serif;
            margin: 0 0 12px;
            color: var(--ink);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .link {
            color: var(--accent);
            font-weight: 600;
        }

        .link:hover {
            color: #166a3d;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 6vw;
            background: rgba(255, 255, 255, 0.84);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(225, 230, 238, 0.7);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #2eb76a);
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 600;
        }

        .brand-tag {
            font-size: 12px;
            color: var(--muted);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .nav a {
            font-size: 14px;
            color: var(--muted);
            padding: 6px 10px;
            border-radius: 999px;
            transition: all 0.2s ease;
        }

        .nav a:hover {
            background: var(--surface-2);
            color: var(--ink);
        }

        .page {
            padding: 40px 6vw 80px;
        }

        .page-shell {
            max-width: 980px;
            margin: 0 auto;
        }

        .page-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
        }

        .page-title {
            font-size: clamp(28px, 4vw, 44px);
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .subtle {
            color: var(--muted);
            font-size: 14px;
            margin: 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: var(--shadow);
        }

        .card-soft {
            background: var(--surface-2);
            border: 1px solid rgba(215, 230, 221, 0.8);
            border-radius: 18px;
            padding: 20px;
        }

        .grid {
            display: grid;
            gap: 18px;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: 0 12px 24px rgba(31, 138, 80, 0.25);
        }

        .btn:hover {
            transform: translateY(-1px);
            background: #176c3d;
        }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--ink);
            box-shadow: none;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #e4efe8;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            box-shadow: 0 12px 24px rgba(207, 58, 43, 0.2);
        }

        .btn-danger:hover {
            background: #b83225;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 13px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            background: #f2f5f7;
            font-size: 12px;
            color: var(--muted);
        }

        .list {
            display: grid;
            gap: 16px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 16px 18px;
            border-radius: 16px;
            background: var(--surface-2);
            border: 1px solid transparent;
        }

        .list-item:hover {
            border-color: var(--border);
        }

        .form-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 26px;
            box-shadow: var(--shadow);
        }

        .form-fields p {
            margin: 0 0 14px;
        }

        .form-fields label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-fields input,
        .form-fields select,
        .form-fields textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fff;
            font-family: inherit;
            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        .form-fields input:focus,
        .form-fields select:focus,
        .form-fields textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31, 122, 91, 0.15);
        }

        .section {
            padding: 18px;
            border-radius: 16px;
            background: var(--surface-2);
            border: 1px dashed rgba(225, 230, 238, 0.9);
            margin-bottom: 18px;
        }

        .warning {
            border-radius: 18px;
            border: 1px solid rgba(238, 166, 58, 0.5);
            background: #fff7e8;
            padding: 18px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .between {
            justify-content: space-between;
        }

        .stack {
            display: grid;
            gap: 16px;
        }

        .narrow {
            max-width: 620px;
            margin: 0 auto;
        }

        .center {
            text-align: center;
        }

        .meta {
            color: var(--muted);
            font-size: 14px;
        }

        .mt-sm {
            margin-top: 18px;
        }

        .mb-sm {
            margin-bottom: 16px;
        }

        .footer {
            text-align: center;
            padding: 30px 0 40px;
            font-size: 12px;
            color: var(--muted);
        }

        .reveal {
            animation: rise 0.6s ease both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            .page-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav {
                justify-content: flex-start;
            }

            .list-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">
 
        <nav class="nav">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'contact_list' %}">Contacts</a>
                <a href="{% url 'add_contact' %}" class="btn btn-sm">New contact</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-secondary btn-sm">Sign out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn btn-sm">Create account</a>
            {% endif %}
        </nav>
    </header>

    <main class="page">
        <div class="page-shell">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        Keep every relationship close and organized.
    </footer>
</body>
</html>
