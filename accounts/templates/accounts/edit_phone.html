{% extends "accounts/base.html" %}

{% block title %}Edit Phone Number{% endblock %}

{% block content %}
<div class="page-head">
    <div>
        <div class="eyebrow">Update number</div>
        <h1 class="page-title">Edit Phone Number</h1>
        <p class="subtle">For {{ contact.first_name }} {{ contact.last_name }}.</p>
    </div>
    <div class="toolbar">
        <a href="{% url 'contact_detail' contact.id %}" class="btn btn-secondary btn-sm">Back to Contact</a>
    </div>
</div>

<div class="form-card reveal">
    <form method="POST" class="stack">
        {% csrf_token %}
        <div class="section">
            <div class="form-fields">
                {{ form.as_p }}
            </div>
        </div>
        <div class="toolbar">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{% url 'contact_detail' contact.id %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
